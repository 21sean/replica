name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: node ${{ matrix.node }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Run test suite
        run: npm test
      - name: Server boots cleanly
        shell: bash
        run: |
          node server.js &
          SERVER_PID=$!
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:4747/api/health > /dev/null; then
              echo "server healthy"
              kill $SERVER_PID
              exit 0
            fi
            sleep 0.5
          done
          echo "server failed to become healthy" >&2
          kill $SERVER_PID || true
          exit 1
